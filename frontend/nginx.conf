# OrbitGuard frontend (production) — serves the built SPA and proxies the API.
# Mirrors the Vite dev proxy: "/api" is forwarded to the backend WITH the prefix
# preserved (the backend mounts all routes under prefix="/api").
server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed — safe to cache aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → backend service on the compose network. No trailing slash on proxy_pass
    # so the original "/api/..." path is passed through unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Single-page app: unknown paths fall back to index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
