name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend dev deps
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r backend/requirements-dev.txt
      - name: Run pytest
        run: PYTHONPATH=backend .venv/bin/pytest backend/tests -q

  frontend:
    name: Frontend (vitest + build + size)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      # npm/cli#4828: cross-platform lockfiles can drop optional native bindings
      # (rolldown/lightningcss/oxide). A fresh install with optionals pulls the
      # correct linux binaries so `vite build` (and tsc typecheck) succeed.
      - name: Install deps
        run: npm install --include=optional --no-audit --no-fund
      - name: Unit + component tests
        run: npm test
      - name: Typecheck + production build
        run: npm run build
      - name: Bundle-size budget
        run: npm run size

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend runtime deps (for the E2E API server)
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r backend/requirements.txt
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --include=optional --no-audit --no-fund
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (boots uvicorn + vite via webServer)
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
