# Fully-static OrbitGuard deploy.
#
# Netlify cannot run the FastAPI (Python) server, so we ship a 100% static SPA: the deterministic API
# is pre-baked into `frontend/public/api-static/**` (committed; regenerate with
# `node scripts/snapshot-api.mjs` against a running backend), and `VITE_STATIC_API=1` makes the app
# read those files instead of calling `/api`. No backend, no serverless functions.

# NOTE: vite@8 is rolldown-vite (Rust native bindings). The committed package-lock.json is
# generated on macOS and PRUNES the linux-x64 optional binding (npm/cli#4828). On Netlify, the
# fix must remove BOTH the lockfile AND the cached node_modules — Netlify restores node_modules
# from a prior build's cache, so `npm install` alone reports "up to date" and never re-resolves
# the missing binding. Wiping both forces a clean, platform-correct install that pulls
# binding-linux-x64-gnu. (Determinism trade-off is acceptable for this static demo.)
[build]
  base = "frontend"
  command = "rm -rf node_modules package-lock.json && npm install --no-audit --no-fund && VITE_STATIC_API=1 npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: serve real files first (incl. /api-static/*.json), else hand routing to the SPA.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
